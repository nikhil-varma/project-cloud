# This rule is not used by the project project-cloud itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the vector.qdrant.cloud.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: project-cloud
    app.kubernetes.io/managed-by: kustomize
  name: qdrantcluster-editor-role
rules:
- apiGroups:
  - vector.qdrant.cloud
  resources:
  - qdrantclusters
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - vector.qdrant.cloud
  resources:
  - qdrantclusters/status
  verbs:
  - get
