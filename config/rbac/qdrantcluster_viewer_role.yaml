# This rule is not used by the project project-cloud itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to vector.qdrant.cloud resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: project-cloud
    app.kubernetes.io/managed-by: kustomize
  name: qdrantcluster-viewer-role
rules:
- apiGroups:
  - vector.qdrant.cloud
  resources:
  - qdrantclusters
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - vector.qdrant.cloud
  resources:
  - qdrantclusters/status
  verbs:
  - get
